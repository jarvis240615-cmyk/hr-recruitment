services:
  - type: web
    name: hr-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./hr.db
      - key: CORS_ORIGINS
        value: "*"
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /health

  - type: web
    name: hr-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: VITE_API_URL
        sync: false
